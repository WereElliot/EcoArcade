<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoArcade Stewardship</title>
    <link rel="icon" type="image/png" href="../assets/icons/icon48.png">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dashboard-shell">
        <header class="dashboard-topbar">
            <div class="topbar-start">
                <button
                    id="sidebarToggleBtn"
                    class="menu-toggle"
                    type="button"
                    aria-expanded="false"
                    aria-controls="sidebarMenu">
                    <span class="menu-toggle-icon" aria-hidden="true"></span>
                    <span class="sr-only">Toggle navigation menu</span>
                </button>

                <div class="topbar-copy">
                    <button
                        id="brandHomeBtn"
                        class="brand-lockup brand-home-btn"
                        type="button"
                        aria-label="Go to home section">
                        <img class="brand-logo" src="../assets/icons/logo-wordmark.png" alt="EcoArcade">
                    </button>
                </div>
            </div>

            <div class="topbar-end">
                <div class="topbar-status" id="topbarStatusPanel" aria-label="Dashboard status">
                    <div class="status-row" title="TRACK">
                        <span class="status-key">Tracking</span>
                        <strong class="status-row-value live" id="trackingStatus">Active</strong>
                    </div>
                    <div class="status-row" title="RANK">
                        <span class="status-key">Rank</span>
                        <strong class="status-row-value" id="currentRank" data-rank="recruit">Recruit</strong>
                    </div>
                    <div class="status-row" title="POINTS">
                        <span class="status-key">Eco Points</span>
                        <strong class="status-row-value" id="topbarPoints">0</strong>
                    </div>
                </div>

                <button id="themeToggleBtn" class="theme-toggle" type="button" aria-pressed="false" aria-label="Switch to light mode" title="Switch to light mode">
                    <span class="theme-toggle-icon" aria-hidden="true">&#9790;</span>
                    <span class="sr-only">Toggle light and dark mode</span>
                </button>

                <button id="topbarProfileToggleBtn" class="profile-toggle" type="button" aria-expanded="false" aria-controls="topbarStatusPanel" aria-label="Toggle tracking, rank, and points summary" title="Toggle tracking, rank, and points summary">
                    <span class="profile-toggle-icon" aria-hidden="true"></span>
                    <span class="sr-only">Toggle tracking, rank, and points summary</span>
                </button>
            </div>
        </header>

        <div class="dashboard-layout">
            <aside class="sidebar" id="sidebarMenu">
                <nav id="sidebarNav" class="sidebar-nav" aria-label="Dashboard sections">
                    <a class="nav-link" href="index.html" data-href="index.html" data-section-link="home">
                        <span class="nav-icon" style="display:flex; align-items:center; margin-right:10px;"><svg style="width:20px; height:20px; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none;" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></span><span class="nav-label">Home</span>
                    </a>
                    <a class="nav-link" href="insights.html" data-href="insights.html" data-section-link="insights">
                        <span class="nav-icon" style="display:flex; align-items:center; margin-right:10px;"><svg style="width:20px; height:20px; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none;" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></span><span class="nav-label">Impact & Insights</span>
                    </a>
                    <a class="nav-link" href="explainer.html" data-href="explainer.html" data-section-link="explainer">
                        <span class="nav-icon" style="display:flex; align-items:center; margin-right:10px;"><svg style="width:20px; height:20px; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none;" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg></span><span class="nav-label">Explainer</span>
                    </a>
                    <a class="nav-link" href="stewardship.html" data-href="stewardship.html" data-section-link="stewardship">
                        <span class="nav-icon" style="display:flex; align-items:center; margin-right:10px;"><svg style="width:20px; height:20px; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none;" viewBox="0 0 24 24"><path d="M12 22a10 10 0 0 0 10-10C22 5 12 2 12 2S2 5 2 12a10 10 0 0 0 10 10z"></path><path d="M12 22V12"></path></svg></span><span class="nav-label">Stewardship</span>
                    </a>
                    <a class="nav-link" href="wallet.html" data-href="wallet.html" data-section-link="wallet">
                        <span class="nav-icon" style="display:flex; align-items:center; margin-right:10px;"><svg style="width:20px; height:20px; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; fill:none;" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></span><span class="nav-label">Web3 Wallet</span>
                    </a>
</nav>
            </aside>

            <main class="dashboard-main" id="dashboardMain">
                <section class="panel" id="stewardship" data-section="stewardship">
                    <div class="panel-header">
                        <div>
                            <p class="section-kicker">Stewardship</p>
                            <h2>AI-Verified Actions</h2>
                        </div>
                    </div>
                    <div class="stewardship-panel">
                        <p class="hero-text">Upload a photo of a real-world climate action (e.g., planting a tree). Our AI Copilot will verify it, mint an NFT, and reward you with EcoPoints!</p>
                        <div class="upload-container" style="margin: 20px 0;">
                            <input type="file" id="actionImageInput" accept="image/*" />
                            <div><img id="actionImagePreview" src="" class="hidden" style="max-width: 300px; margin-top: 10px; border-radius: 8px; border: 1px solid var(--border-color);" /></div>
                        </div>
                        <button id="verifyActionBtn" class="primary-btn mt-2" type="button" disabled>Verify Action & Mint NFT</button>
                        <div id="aiResultPanel" class="hidden" style="margin-top: 15px; padding: 15px; border-radius: 8px; background: var(--bg-secondary);">
                            <h3 id="aiRationaleTitle" style="margin-top: 0;">Result</h3>
                            <p id="aiRationaleText" style="margin-bottom: 0;"></p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="../assets/lib/ethers.umd.min.js"></script>
    <script src="../assets/lib/exifr.lite.umd.js"></script>
    <script src="../services/aiCopilot.js"></script>
    <script src="../services/web3Integration.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
